name: TypeScript SDK

on:
  push:
    branches: [main]
    paths: ["sdks/typescript/**", ".github/workflows/typescript.yml"]
  pull_request:
    branches: [main]
    paths: ["sdks/typescript/**", ".github/workflows/typescript.yml"]

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
